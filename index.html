<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Champona Tracker Ultimate</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>
body { font-family: Arial; text-align: center; background:#111; color:white; }
button, input { padding:8px; margin:6px; }
table { margin:20px auto; border-collapse: collapse; width:420px; }
td, th { border:1px solid #444; padding:8px; }
.done { color:lightgreen; }
</style>
</head>

<body>

<h1>Champona Tracker</h1>

<p id="streak"></p>
<p id="goal"></p>

<button onclick="addRep()">+ Champona (SPACE)</button><br>

<input type="number" id="customInput" placeholder="1-20">
<button onclick="addCustom()">Custom</button><br>

<button onclick="exportData()">Export Data</button>
<button onclick="reset()">Reset</button>

<h2>Today</h2>
<table>
<tr><th>Champona</th><th>Time</th></tr>
<tbody id="tableBody"></tbody>
</table>

<script>
let currentRep = 1;

function getToday() {
  return new Date().toISOString().split("T")[0];
}

const today = getToday();

// STORAGE
function getReps() {
  return JSON.parse(localStorage.getItem("reps") || "[]");
}
function saveReps(data) {
  localStorage.setItem("reps", JSON.stringify(data));
}

// ADD
function addRep() {
  let reps = getReps();
  if (reps.length >= 20) return alert("Done!");

  reps.push({ num: reps.length+1, time: new Date().toLocaleTimeString() });
  saveReps(reps);
  load();
}

function addCustom() {
  let num = parseInt(customInput.value);
  if (!num || num<1 || num>20) return;

  let reps = getReps();
  reps.push({ custom:num, time:new Date().toLocaleTimeString() });
  saveReps(reps);

  customInput.value="";
  load();
}

// LOAD
function load() {
  let reps = getReps();
  tableBody.innerHTML="";

  reps.forEach((r,i)=>{
    let num = r.custom || r.num;
    tableBody.innerHTML += `<tr><td>champona${num}</td><td>${r.time}</td></tr>`;
  });

  updateGoal();
}

// GOAL
function updateGoal() {
  let count = getReps().length;
  goal.innerText = `Goal: ${count}/20`;
}

// STREAK
function updateStreak() {
  let last = localStorage.getItem("lastDay");
  let streak = parseInt(localStorage.getItem("streak")||"0");

  if (last !== today) {
    streak++;
    localStorage.setItem("streak", streak);
    localStorage.setItem("lastDay", today);
  }

  document.getElementById("streak").innerText = "Streak: " + streak;
}

// EXPORT
function exportData() {
  let data = localStorage.getItem("history") || "{}";
  let blob = new Blob([data], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "champona-data.json";
  a.click();
}

// RESET
function reset() {
  localStorage.clear();
  location.reload();
}

// SPACE
document.addEventListener("keydown", e=>{
  if(e.code==="Space"){ e.preventDefault(); addRep(); }
});

// INIT
load();
updateStreak();

// SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
