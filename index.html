<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Champona Tracker</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }
    table {
      margin: auto;
      border-collapse: collapse;
      width: 350px;
    }
    td, th {
      border: 1px solid #444;
      padding: 10px;
    }
    button {
      padding: 10px 20px;
      margin: 15px;
      font-size: 16px;
      cursor: pointer;
    }
    .done {
      color: lightgreen;
    }
  </style>
</head>
<body>

<h1>Champona Tracker (20)</h1>

<button onclick="addRep()">+ Complete Champona</button>
<button onclick="reset()">Reset</button>

<table>
  <tr>
    <th>Champona</th>
    <th>Time</th>
  </tr>
  <tbody id="tableBody"></tbody>
</table>

<script>
  let currentRep = 1;

  function formatTime(date) {
    return date.toLocaleTimeString();
  }

  function addRep() {
    if (currentRep > 20) {
      alert("All 20 Champonas completed!");
      return;
    }

    let table = document.getElementById("tableBody");
    let row = document.createElement("tr");

    let repCell = document.createElement("td");
    repCell.textContent = "champona" + currentRep;

    let timeCell = document.createElement("td");
    let now = new Date();
    timeCell.textContent = formatTime(now);
    timeCell.classList.add("done");

    row.appendChild(repCell);
    row.appendChild(timeCell);
    table.appendChild(row);

    currentRep++;
  }

  function reset() {
    document.getElementById("tableBody").innerHTML = "";
    currentRep = 1;
  }
</script>

</body>
</html>
