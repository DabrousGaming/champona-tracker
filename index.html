<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Champona Tracker Cloud</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}

button {
  padding: 10px;
  margin: 8px;
  cursor: pointer;
}

table {
  margin: 20px auto;
  border-collapse: collapse;
  width: 300px;
}

td, th {
  border: 1px solid #444;
  padding: 10px;
}

.done {
  color: lightgreen;
}
</style>
</head>

<body>

<h1>Champona Tracker ☁️</h1>

<button onclick="login()">Login with Google</button>
<button onclick="logout()">Logout</button>

<br>

<button onclick="addRep()">+ Champona</button>

<h2>Today</h2>

<table>
<tr>
<th>Champona</th>
<th>Time</th>
</tr>
<tbody id="tableBody"></tbody>
</table>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCmpmxQnDDOATHJGAGQmMMcb1Nv-fLuX08",
  authDomain: "champona-tracker.firebaseapp.com",
  projectId: "champona-tracker",
  storageBucket: "champona-tracker.firebasestorage.app",
  messagingSenderId: "828936745129",
  appId: "1:828936745129:web:a8ba8c2ffc35b54454f9b8",
  measurementId: "G-0446VV8Y6T"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user = null;

// LOGIN
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// LOGOUT
function logout() {
  auth.signOut();
}

// AUTH STATE
auth.onAuthStateChanged(u => {
  if (u) {
    user = u;
    loadData();
  } else {
    user = null;
    document.getElementById("tableBody").innerHTML = "";
  }
});

// ADD REP
async function addRep() {
  if (!user) {
    alert("Login first!");
    return;
  }

  let time = new Date().toLocaleTimeString();

  await db.collection("users")
    .doc(user.uid)
    .collection("reps")
    .add({
      time: time,
      created: new Date()
    });

  loadData();
}

// LOAD DATA
async function loadData() {
  if (!user) return;

  const snapshot = await db.collection("users")
    .doc(user.uid)
    .collection("reps")
    .orderBy("created")
    .get();

  let table = document.getElementById("tableBody");
  table.innerHTML = "";

  let i = 1;
  snapshot.forEach(doc => {
    let d = doc.data();

    let row = document.createElement("tr");

    row.innerHTML = `
      <td>champona${i}</td>
      <td class="done">${d.time}</td>
    `;

    table.appendChild(row);
    i++;
  });
}
</script>

</body>
</html>
