<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Champona Tracker Pro</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}

table {
  margin: 20px auto;
  border-collapse: collapse;
  width: 420px;
}

td, th {
  border: 1px solid #444;
  padding: 8px;
}

button, input {
  padding: 8px;
  margin: 6px;
}

.done { color: lightgreen; }

.actions button {
  padding: 4px 6px;
  margin: 2px;
}

.history { margin-top: 30px; }
</style>
</head>

<body>

<h1>Champona Tracker Pro</h1>

<button onclick="addRep()">+ Champona (SPACE)</button>

<br>

<input type="number" id="customInput" placeholder="Enter champona (1-20)">
<button onclick="addCustom()">Add Custom</button>

<br>

<button onclick="reset()">Reset</button>
<button onclick="toggleHistory()">Show History</button>

<h2>Today</h2>

<p id="stats"></p>

<table>
<tr>
<th>Champona</th>
<th>Time</th>
<th>Actions</th>
</tr>
<tbody id="tableBody"></tbody>
</table>

<div class="history" id="historySection" style="display:none;">
<h2>History</h2>
<div id="historyContent"></div>
</div>

<script>
let currentRep = 1;

function getToday() {
  return new Date().toISOString().split("T")[0];
}

const today = getToday();

// --- STORAGE ---
function getReps() {
  return JSON.parse(localStorage.getItem("reps") || "[]");
}

function saveReps(data) {
  localStorage.setItem("reps", JSON.stringify(data));
}

// --- PREVENT DUPLICATE ---
function exists(num) {
  return getReps().some(r => (r.custom || r.num) == num);
}

// --- ADD ROW ---
function addRow(rep, index) {
  const num = rep.custom || rep.num;
  const row = document.createElement("tr");

  row.innerHTML = `
    <td>champona${num}</td>
    <td class="done">${rep.time}</td>
    <td class="actions">
      <button onclick="edit(${index})">✏️</button>
      <button onclick="remove(${index})">❌</button>
    </td>
  `;

  document.getElementById("tableBody").appendChild(row);
}

// --- LOAD ---
function loadToday() {
  let reps = getReps();
  document.getElementById("tableBody").innerHTML = "";

  reps.forEach((rep, i) => addRow(rep, i));

  currentRep = reps.length + 1;
  updateStats();
}

// --- SAVE REP ---
function saveRep(obj) {
  let reps = getReps();
  reps.push(obj);
  saveReps(reps);
}

// --- ADD NORMAL ---
function addRep() {
  if (currentRep > 20) return alert("Completed!");

  if (exists(currentRep)) {
    currentRep++;
    addRep();
    return;
  }

  let time = new Date().toLocaleTimeString();
  saveRep({ num: currentRep, time });

  loadToday();
}

// --- ADD CUSTOM ---
function addCustom() {
  let num = parseInt(document.getElementById("customInput").value);

  if (!num || num < 1 || num > 20) return alert("1-20 only");
  if (exists(num)) return alert("Already added!");

  let time = new Date().toLocaleTimeString();
  saveRep({ custom: num, time });

  document.getElementById("customInput").value = "";
  loadToday();
}

// --- DELETE ---
function remove(i) {
  let reps = getReps();
  reps.splice(i, 1);
  saveReps(reps);
  loadToday();
}

// --- EDIT ---
function edit(i) {
  let reps = getReps();
  let newNum = prompt("Enter new champona number:");

  if (!newNum) return;
  newNum = parseInt(newNum);

  if (newNum < 1 || newNum > 20) return alert("Invalid");
  if (exists(newNum)) return alert("Duplicate!");

  reps[i].custom = newNum;
  delete reps[i].num;

  saveReps(reps);
  loadToday();
}

// --- RESET ---
function reset() {
  localStorage.removeItem("reps");
  location.reload();
}

// --- HISTORY ---
function checkNewDay() {
  const savedDate = localStorage.getItem("date");
  let reps = getReps();

  if (savedDate && savedDate !== today && reps.length > 0) {
    let history = JSON.parse(localStorage.getItem("history") || "{}");
    history[savedDate] = reps;
    localStorage.setItem("history", JSON.stringify(history));
    localStorage.setItem("reps", JSON.stringify([]));
  }

  localStorage.setItem("date", today);
}

function toggleHistory() {
  let sec = document.getElementById("historySection");
  sec.style.display = sec.style.display === "none" ? "block" : "none";
  loadHistory();
}

function loadHistory() {
  let history = JSON.parse(localStorage.getItem("history") || "{}");
  let container = document.getElementById("historyContent");

  container.innerHTML = "";

  for (let date in history) {
    let html = `<h3>${date}</h3><ul>`;

    history[date].forEach(rep => {
      let num = rep.custom || rep.num;
      html += `<li>champona${num} - ${rep.time}</li>`;
    });

    html += "</ul>";

    container.innerHTML += html;
  }
}

// --- STATS ---
function updateStats() {
  let reps = getReps();

  let count = reps.length;

  let gaps = [];
  for (let i = 1; i < reps.length; i++) {
    let t1 = new Date("1970/01/01 " + reps[i-1].time);
    let t2 = new Date("1970/01/01 " + reps[i].time);
    gaps.push((t2 - t1)/1000);
  }

  let avg = gaps.length ? (gaps.reduce((a,b)=>a+b)/gaps.length).toFixed(1) : 0;

  document.getElementById("stats").innerText =
    `Completed: ${count} | Avg gap: ${avg}s`;
}

// --- SPACE KEY ---
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    e.preventDefault();
    addRep();
  }
});

// INIT
checkNewDay();
loadToday();

</script>

</body>
</html>
