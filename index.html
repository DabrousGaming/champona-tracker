<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Champona Tracker</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 350px;
    }

    td, th {
      border: 1px solid #444;
      padding: 10px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      border: none;
    }

    .done {
      color: lightgreen;
    }

    .progress-container {
      width: 350px;
      height: 20px;
      background: #333;
      margin: 15px auto;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: limegreen;
      transition: 0.3s;
    }
  </style>
</head>

<body>

<h1>Champona Tracker (20)</h1>

<button onclick="addRep()">+ Complete Champona</button>
<button onclick="reset()">Reset</button>

<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

<table>
  <tr>
    <th>Champona</th>
    <th>Time</th>
  </tr>
  <tbody id="tableBody"></tbody>
</table>

<script>
document.addEventListener("DOMContentLoaded", () => {

let currentRep = 1;

// Stable date format
function getToday() {
  return new Date().toISOString().split("T")[0];
}

const today = getToday();

// Load saved data
function loadData() {
  const savedDate = localStorage.getItem("date");
  let savedReps = JSON.parse(localStorage.getItem("reps") || "[]");

  // Reset if new day
  if (savedDate !== today) {
    localStorage.setItem("date", today);
    localStorage.setItem("reps", JSON.stringify([]));
    savedReps = [];
  }

  // Restore rows
  savedReps.forEach((rep, index) => {
    addRow(rep.time, index + 1);
  });

  currentRep = savedReps.length + 1;
  updateProgress();
}

// Save rep
function saveRep(time) {
  let reps = JSON.parse(localStorage.getItem("reps") || "[]");
  reps.push({ time: time });
  localStorage.setItem("reps", JSON.stringify(reps));
}

// Format time
function formatTime(date) {
  return date.toLocaleTimeString();
}

// Add row
function addRow(time, repNumber) {
  const table = document.getElementById("tableBody");
  const row = document.createElement("tr");

  const repCell = document.createElement("td");
  repCell.textContent = "champona" + repNumber;

  const timeCell = document.createElement("td");
  timeCell.textContent = time;
  timeCell.classList.add("done");

  row.appendChild(repCell);
  row.appendChild(timeCell);
  table.appendChild(row);
}

// Progress bar
function updateProgress() {
  const percent = ((currentRep - 1) / 20) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

// Add rep
window.addRep = function () {
  if (currentRep > 20) {
    alert("All 20 Champonas completed!");
    return;
  }

  const now = formatTime(new Date());

  addRow(now, currentRep);
  saveRep(now);

  currentRep++;
  updateProgress();
};

// Reset
window.reset = function () {
  localStorage.clear();
  location.reload();
};

// Initialize
loadData();

});
</script>

</body>
</html>
