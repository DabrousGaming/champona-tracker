<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Champona Tracker</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}

table {
  margin: 20px auto;
  border-collapse: collapse;
  width: 350px;
}

td, th {
  border: 1px solid #444;
  padding: 10px;
}

button, input {
  padding: 10px;
  margin: 8px;
  font-size: 14px;
}

.done {
  color: lightgreen;
}

.history {
  margin-top: 30px;
}
</style>
</head>

<body>

<h1>Champona Tracker</h1>

<!-- Normal -->
<button onclick="addRep()">+ Champona</button>

<!-- Custom -->
<br>
<input type="number" id="customInput" placeholder="Enter champona (1-20)" min="1" max="20">
<button onclick="addCustom()">Add Custom Champona</button>

<br>

<button onclick="reset()">Reset</button>
<button onclick="toggleHistory()">Show History</button>

<h2>Today</h2>
<table>
<tr><th>Champona</th><th>Time</th></tr>
<tbody id="tableBody"></tbody>
</table>

<div class="history" id="historySection" style="display:none;">
<h2>History</h2>
<div id="historyContent"></div>
</div>

<script>
let currentRep = 1;

function getToday() {
  return new Date().toISOString().split("T")[0];
}

const today = getToday();

// Move old data to history
function checkNewDay() {
  const savedDate = localStorage.getItem("date");
  let reps = JSON.parse(localStorage.getItem("reps") || "[]");

  if (savedDate && savedDate !== today && reps.length > 0) {
    let history = JSON.parse(localStorage.getItem("history") || "{}");
    history[savedDate] = reps;
    localStorage.setItem("history", JSON.stringify(history));
    localStorage.setItem("reps", JSON.stringify([]));
  }

  localStorage.setItem("date", today);
}

// Load today
function loadToday() {
  let reps = JSON.parse(localStorage.getItem("reps") || "[]");

  reps.forEach((rep, index) => {
    let num = rep.custom ? rep.custom : (index + 1);
    addRow(rep.time, num);
  });

  currentRep = reps.length + 1;
}

// Save
function saveRep(obj) {
  let reps = JSON.parse(localStorage.getItem("reps") || "[]");
  reps.push(obj);
  localStorage.setItem("reps", JSON.stringify(reps));
}

// Add row
function addRow(time, num) {
  let row = document.createElement("tr");

  row.innerHTML = `
    <td>champona${num}</td>
    <td class="done">${time}</td>
  `;

  document.getElementById("tableBody").appendChild(row);
}

// Normal add
function addRep() {
  if (currentRep > 20) {
    alert("Completed!");
    return;
  }

  let time = new Date().toLocaleTimeString();

  addRow(time, currentRep);
  saveRep({ time });

  currentRep++;
}

// Custom add
function addCustom() {
  let num = parseInt(document.getElementById("customInput").value);

  if (!num || num < 1 || num > 20) {
    alert("Enter number between 1-20");
    return;
  }

  let time = new Date().toLocaleTimeString();

  addRow(time, num);
  saveRep({ time, custom: num });

  document.getElementById("customInput").value = "";
}

// Reset
function reset() {
  localStorage.removeItem("reps");
  location.reload();
}

// Toggle history
function toggleHistory() {
  let sec = document.getElementById("historySection");
  sec.style.display = sec.style.display === "none" ? "block" : "none";
  loadHistory();
}

// Load history
function loadHistory() {
  let history = JSON.parse(localStorage.getItem("history") || "{}");
  let container = document.getElementById("historyContent");

  container.innerHTML = "";

  for (let date in history) {
    let div = document.createElement("div");

    let html = `<h3>${date}</h3><ul>`;

    history[date].forEach((rep, i) => {
      let num = rep.custom ? rep.custom : (i + 1);
      html += `<li>champona${num} - ${rep.time}</li>`;
    });

    html += "</ul>";

    div.innerHTML = html;
    container.appendChild(div);
  }
}

// Init
checkNewDay();
loadToday();
</script>

</body>
</html>
