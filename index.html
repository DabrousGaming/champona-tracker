
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif}
:root{
  --bg:#0d0d0f;
  --surface:#161618;
  --surface2:#1e1e22;
  --border:#2a2a30;
  --border2:#38383f;
  --text:#f0f0f2;
  --muted:#6b6b78;
  --muted2:#4a4a55;
  --accent:#5b7fff;
  --accent-dim:#5b7fff22;
  --accent-border:#5b7fff55;
  --green:#3ddc84;
  --green-dim:#3ddc8420;
  --green-border:#3ddc8450;
  --amber:#f5a623;
  --red:#ff5f5f;
  --radius:10px;
  --radius-lg:14px;
}
.app{background:var(--bg);color:var(--text);min-height:600px;padding:1.5rem 1.25rem;max-width:480px;margin:0 auto;border-radius:16px}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.brand{display:flex;flex-direction:column;gap:2px}
.brand-name{font-size:17px;font-weight:600;letter-spacing:-0.3px;color:var(--text)}
.brand-date{font-size:12px;color:var(--muted)}
.topbtns{display:flex;gap:6px}
.tbtn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 11px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s}
.tbtn:hover{border-color:var(--border2);color:var(--text)}

.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1.25rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 10px;text-align:center}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px}
.stat-val{font-size:21px;font-weight:600;color:var(--text);line-height:1}
.stat-val.streak{color:var(--amber)}

.prog-wrap{margin-bottom:1.25rem}
.prog-track{background:var(--surface2);border-radius:100px;height:5px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:100px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.prog-labels{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:var(--muted)}

.timer-pill{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px 16px;font-size:12px;color:var(--muted);margin-bottom:1.25rem}
.timer-pill .tval{font-weight:600;color:var(--text);font-variant-numeric:tabular-nums}
.timer-pill .pb{color:var(--green)}
.timer-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}

.actions{display:flex;gap:7px;margin-bottom:10px}
.btn-primary{flex:1;background:var(--accent);border:none;border-radius:var(--radius);padding:10px 14px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .15s;letter-spacing:-0.1px}
.btn-primary:hover{opacity:.88}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-secondary:hover{border-color:var(--border2);color:var(--text)}
.btn-danger{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px;font-size:13px;color:#ff5f5f88;cursor:pointer;transition:all .15s}
.btn-danger:hover{border-color:#ff5f5f55;color:var(--red)}

.add-row{display:flex;gap:7px;margin-bottom:1.5rem}
.add-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-size:13px;color:var(--text);outline:none;transition:border .15s}
.add-row input::placeholder{color:var(--muted2)}
.add-row input:focus{border-color:var(--accent-border)}
.add-row button{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 16px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.add-row button:hover{border-color:var(--border2);color:var(--text)}

.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:1.5rem}
.cell{aspect-ratio:1;border-radius:var(--radius);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;position:relative;transition:all .15s;background:var(--surface)}
.cell:hover:not(.done){border-color:var(--accent-border);color:var(--text);background:var(--surface2)}
.cell.next{border-color:var(--accent-border);color:var(--accent);background:var(--accent-dim)}
.cell.done{background:var(--green-dim);border-color:var(--green-border);color:var(--green)}
.cell .ndot{width:4px;height:4px;border-radius:50%;background:var(--amber);margin-top:3px}
.cell .nbtn{position:absolute;bottom:3px;right:4px;font-size:10px;color:var(--amber);opacity:0;background:none;border:none;cursor:pointer;padding:0;line-height:1;transition:opacity .1s}
.cell .delbtn{position:absolute;top:3px;right:4px;font-size:10px;color:var(--red);opacity:0;background:none;border:none;cursor:pointer;padding:0;line-height:1;transition:opacity .1s}
.cell.done:hover .nbtn,.cell.done:hover .delbtn{opacity:.7}
.cell.done:hover .nbtn:hover,.cell.done:hover .delbtn:hover{opacity:1}

.section-label{font-size:10px;font-weight:600;color:var(--muted2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}

.hmap{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1.5rem}
.hday{font-size:10px;color:var(--muted2);text-align:center;padding-bottom:2px}
.hcell{aspect-ratio:1;border-radius:5px;background:var(--surface2)}
.hcell.partial{background:#f5a62340}
.hcell.full{background:#3ddc8455}

.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;font-size:12px}
.hist-date{color:var(--muted);font-weight:500}
.hist-badge{font-size:10px;padding:2px 8px;border-radius:100px;background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)}
.hist-chips{display:flex;flex-wrap:wrap;gap:3px}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:100px;font-size:11px;padding:2px 8px;color:var(--muted)}
.chip.noted{border-color:#f5a62344;color:var(--amber)}

.modal-wrap{background:rgba(0,0,0,0.7);border-radius:var(--radius-lg);padding:2rem 1rem;display:flex;align-items:center;justify-content:center;min-height:200px;margin-bottom:1rem}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:1.25rem;width:100%;max-width:300px}
.modal h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px}
.modal textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:13px;color:var(--text);outline:none;resize:vertical;min-height:70px;margin-bottom:10px}
.modal textarea:focus{border-color:var(--accent-border)}
.modal textarea::placeholder{color:var(--muted2)}
.modal-btns{display:flex;gap:7px}
.modal-btns button{flex:1;border-radius:var(--radius);padding:8px;font-size:13px;cursor:pointer;transition:all .15s}
.modal-btns .save{background:var(--accent);border:none;color:#fff;font-weight:600}
.modal-btns .save:hover{opacity:.88}
.modal-btns .cancel{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.modal-btns .cancel:hover{border-color:var(--border2);color:var(--text)}

.confetti-area{position:relative;height:0;overflow:visible}
.cp{position:absolute;width:7px;height:7px;border-radius:2px;pointer-events:none;animation:cf 1.2s ease-in forwards}
@keyframes cf{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(130px) rotate(720deg)}}
</style>

<div class="app" id="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-name">Champona Tracker</div>
      <div class="brand-date" id="dateLabel">—</div>
    </div>
    <div class="topbtns">
      <button class="tbtn" onclick="toggleTheme()" id="themeBtn">☀</button>
      <button class="tbtn" onclick="exportCSV()">↓ CSV</button>
      <button class="tbtn" onclick="toggleSound()" id="soundBtn">♪</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Done</div><div class="stat-val" id="sDone">0</div></div>
    <div class="stat"><div class="stat-label">Left</div><div class="stat-val" id="sLeft">20</div></div>
    <div class="stat"><div class="stat-label">Avg gap</div><div class="stat-val" id="sAvg">—</div></div>
    <div class="stat"><div class="stat-label">Streak</div><div class="stat-val streak" id="sStreak">0 🔥</div></div>
  </div>

  <div class="timer-pill" id="timerPill" style="display:none">
    <div class="timer-dot"></div>
    <span id="timerVal">0:00</span>
    <span style="color:var(--muted2)">|</span>
    <span style="font-size:11px;color:var(--muted)">best</span>
    <span class="pb" id="pbVal">—</span>
  </div>

  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-labels"><span id="progPct">0%</span><span id="progCount">0 / 20</span></div>
  </div>

  <div class="actions">
    <button class="btn-primary" id="mainBtn" onclick="addNext()">+ Champona 1 &nbsp;·&nbsp; Space</button>
    <button class="btn-secondary" onclick="undoLast()">↩</button>
    <button class="btn-danger" onclick="doReset()">✕</button>
  </div>

  <div class="add-row">
    <input type="number" id="customIn" placeholder="Mark specific # (1–20)" min="1" max="20">
    <button onclick="addCustom()">Mark</button>
  </div>

  <div id="noteModal" style="display:none">
    <div class="modal-wrap">
      <div class="modal">
        <h3 id="noteTitle">Note for champona —</h3>
        <textarea id="noteText" placeholder="e.g. 15 reps, felt strong..."></textarea>
        <div class="modal-btns">
          <button class="save" onclick="saveNote()">Save</button>
          <button class="cancel" onclick="closeNote()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <div class="confetti-area" id="confetti"></div>

  <div class="grid" id="grid"></div>

  <div class="section-label">Last 7 days</div>
  <div class="hmap" id="hmap"></div>

  <div class="section-label">History</div>
  <div id="histContent"></div>
</div>

<script>
const T=20;
let soundOn=true,lightMode=false,undoStack=null,pendingNote=null,timerInt=null;
const ACtx=window.AudioContext||window.webkitAudioContext;
let ac=null;

function beep(f,d){
  if(!soundOn)return;
  try{
    if(!ac)ac=new ACtx();
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.13,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);
    o.start();o.stop(ac.currentTime+d);
  }catch(e){}
}

function toggleSound(){soundOn=!soundOn;document.getElementById('soundBtn').textContent=soundOn?'♪':'♪̶';}
function toggleTheme(){
  lightMode=!lightMode;
  const r=document.getElementById('app');
  if(lightMode){
    r.style.cssText='--bg:#f0f0f4;--surface:#ffffff;--surface2:#f4f4f8;--border:#dddde5;--border2:#c8c8d2;--text:#111118;--muted:#88889a;--muted2:#aaaabc;--accent:#4a6ef5;--accent-dim:#4a6ef512;--accent-border:#4a6ef540;--green:#1a9e5c;--green-dim:#1a9e5c12;--green-border:#1a9e5c40;--amber:#c07a10;--red:#d93030;background:#f0f0f4;color:#111118;min-height:600px;padding:1.5rem 1.25rem;max-width:480px;margin:0 auto;border-radius:16px';
  }else{
    r.style.cssText='min-height:600px;padding:1.5rem 1.25rem;max-width:480px;margin:0 auto;border-radius:16px';
  }
  document.getElementById('themeBtn').textContent=lightMode?'☽':'☀';
}

function getToday(){return new Date().toLocaleDateString('en-CA');}
function getReps(){return JSON.parse(localStorage.getItem('reps')||'[]');}
function saveReps(d){localStorage.setItem('reps',JSON.stringify(d));}
function getHist(){return JSON.parse(localStorage.getItem('history')||'{}');}
function saveHist(h){localStorage.setItem('history',JSON.stringify(h));}
function doneNums(){return getReps().map(r=>r.num);}

function checkNewDay(){
  const s=localStorage.getItem('date'),today=getToday(),reps=getReps();
  if(s&&s!==today&&reps.length){
    const h=getHist();h[s]=reps;saveHist(h);saveReps([]);localStorage.removeItem('sessionStart');
  }
  localStorage.setItem('date',today);
}

function calcStreak(){
  const h=getHist();let streak=0,d=new Date();
  if(getReps().length===T){streak=1;d.setDate(d.getDate()-1);}
  for(let i=0;i<365;i++){
    const k=d.toLocaleDateString('en-CA');
    if(h[k]&&h[k].length===T){streak++;d.setDate(d.getDate()-1);}else break;
  }
  return streak;
}

function calcPB(){
  const h=getHist();let best=null;
  for(const k in h){
    const r=h[k];if(r.length<T)continue;
    const ts=r.map(x=>new Date('1970/01/01 '+x.time)).filter(t=>!isNaN(t));
    if(ts.length<2)continue;
    const dur=(Math.max(...ts)-Math.min(...ts))/1000;
    if(best===null||dur<best)best=dur;
  }
  return best;
}

function fmt(s){const m=Math.floor(s/60),sec=Math.round(s%60);return m+':'+String(sec).padStart(2,'0');}
function sessTime(){const ss=localStorage.getItem('sessionStart');return ss?Math.floor((Date.now()-parseInt(ss))/1000):null;}

function startTimer(){
  stopTimer();
  document.getElementById('timerPill').style.display='flex';
  timerInt=setInterval(()=>{const s=sessTime();if(s!==null)document.getElementById('timerVal').textContent=fmt(s);},1000);
}
function stopTimer(){if(timerInt){clearInterval(timerInt);timerInt=null;}}

function addNext(){
  const done=doneNums();if(done.length>=T)return;
  for(let i=1;i<=T;i++)if(!done.includes(i)){commitAdd(i);return;}
}

function addCustom(){
  const n=parseInt(document.getElementById('customIn').value);
  if(!n||n<1||n>T){alert('Enter 1–20');return;}
  if(doneNums().includes(n)){alert('Already done!');return;}
  document.getElementById('customIn').value='';
  commitAdd(n);
}

function commitAdd(n){
  if(doneNums().includes(n))return;
  if(!localStorage.getItem('sessionStart')){localStorage.setItem('sessionStart',Date.now());startTimer();}
  const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const reps=getReps();reps.push({num:n,time,note:''});saveReps(reps);
  undoStack={num:n};
  beep(700,0.1);
  if(reps.length===T)onComplete();
  render();
}

function openNote(n){
  pendingNote=n;
  const rep=getReps().find(r=>r.num===n);
  document.getElementById('noteTitle').textContent='Note for champona '+n;
  document.getElementById('noteText').value=rep?(rep.note||''):'';
  document.getElementById('noteModal').style.display='block';
  setTimeout(()=>document.getElementById('noteText').focus(),50);
}

function saveNote(){
  if(pendingNote===null)return;
  const note=document.getElementById('noteText').value.trim();
  const reps=getReps(),rep=reps.find(r=>r.num===pendingNote);
  if(rep){rep.note=note;saveReps(reps);}
  closeNote();render();
}

function closeNote(){document.getElementById('noteModal').style.display='none';pendingNote=null;}

function removeNum(n){
  saveReps(getReps().filter(r=>r.num!==n));
  beep(300,0.1);
  if(!getReps().length){localStorage.removeItem('sessionStart');stopTimer();}
  render();
}

function undoLast(){if(!undoStack)return;removeNum(undoStack.num);undoStack=null;}

function doReset(){
  if(!confirm('Reset today?'))return;
  saveReps([]);localStorage.removeItem('sessionStart');
  undoStack=null;stopTimer();
  document.getElementById('timerPill').style.display='none';
  render();
}

function onComplete(){
  beep(523,0.1);setTimeout(()=>beep(659,0.1),130);setTimeout(()=>beep(784,0.25),260);
  stopTimer();
  const ss=localStorage.getItem('sessionStart');
  if(ss){
    const dur=Math.floor((Date.now()-parseInt(ss))/1000);
    const pb=calcPB();
    if(pb===null||dur<=pb){
      document.getElementById('pbVal').textContent=fmt(dur)+' ★';
      document.getElementById('pbVal').style.color='var(--green)';
    }
    const h=getHist();h[getToday()]=getReps();saveHist(h);
  }
  spawnConfetti();
}

function spawnConfetti(){
  const area=document.getElementById('confetti');
  const cols=['#5b7fff','#3ddc84','#f5a623','#ff6b9d','#ff5f5f'];
  for(let i=0;i<40;i++){
    const d=document.createElement('div');d.className='cp';
    d.style.left=Math.random()*100+'%';
    d.style.background=cols[i%cols.length];
    d.style.animationDelay=Math.random()*0.4+'s';
    d.style.animationDuration=(0.8+Math.random()*0.8)+'s';
    area.appendChild(d);
  }
  setTimeout(()=>area.innerHTML='',2500);
}

function render(){
  const reps=getReps(),done=doneNums(),count=done.length;
  const next=(()=>{for(let i=1;i<=T;i++)if(!done.includes(i))return i;return null;})();

  document.getElementById('dateLabel').textContent=new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('sDone').textContent=count;
  document.getElementById('sLeft').textContent=T-count;

  const gaps=[];
  for(let i=1;i<reps.length;i++){
    const t1=new Date('1970/01/01 '+reps[i-1].time),t2=new Date('1970/01/01 '+reps[i].time);
    const d=(t2-t1)/1000;if(d>0)gaps.push(d);
  }
  const avg=gaps.length?Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length):null;
  document.getElementById('sAvg').textContent=avg?avg+'s':'—';
  document.getElementById('sStreak').textContent=calcStreak()+' 🔥';

  const pct=Math.round(count/T*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progCount').textContent=count+' / '+T;

  const pb=calcPB();
  if(pb&&!document.getElementById('pbVal').textContent.includes('★'))
    document.getElementById('pbVal').textContent=fmt(Math.round(pb));
  if(localStorage.getItem('sessionStart'))startTimer();

  document.getElementById('mainBtn').textContent=count>=T
    ?'All 20 done! 🎉'
    :'+ Champona '+(next||'')+' · Space';

  const grid=document.getElementById('grid');grid.innerHTML='';
  for(let i=1;i<=T;i++){
    const rep=reps.find(r=>r.num===i);
    const cell=document.createElement('div');
    cell.className='cell'+(rep?' done':(i===next?' next':''));
    const num=document.createElement('span');num.textContent=i;cell.appendChild(num);
    if(rep){
      if(rep.note){const dot=document.createElement('div');dot.className='ndot';cell.appendChild(dot);}
      cell.title=rep.time+(rep.note?' — '+rep.note:'');
      const nb=document.createElement('button');nb.className='nbtn';nb.textContent='✎';nb.title=rep.note?'Edit: '+rep.note:'Add note';
      nb.addEventListener('click',e=>{e.stopPropagation();openNote(i);});cell.appendChild(nb);
      const db=document.createElement('button');db.className='delbtn';db.textContent='✕';db.title='Remove';
      db.addEventListener('click',e=>{e.stopPropagation();if(confirm('Remove '+i+'?'))removeNum(i);});cell.appendChild(db);
    }else{
      cell.addEventListener('click',()=>commitAdd(i));
    }
    grid.appendChild(cell);
  }
  renderHmap();renderHist();
}

function renderHmap(){
  const h=getHist(),hm=document.getElementById('hmap');
  hm.innerHTML='';
  ['S','M','T','W','T','F','S'].forEach(d=>{const l=document.createElement('div');l.className='hday';l.textContent=d;hm.appendChild(l);});
  const today=new Date(),reps=getReps();
  for(let i=6;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const k=d.toLocaleDateString('en-CA');
    const cnt=i===0?reps.length:(h[k]?h[k].length:0);
    const c=document.createElement('div');
    c.className='hcell'+(cnt===T?' full':cnt>0?' partial':'');
    c.title=k+': '+cnt+'/'+T;
    hm.appendChild(c);
  }
}

function renderHist(){
  const h=getHist(),con=document.getElementById('histContent');
  const dates=Object.keys(h).sort().reverse();
  if(!dates.length){con.innerHTML='<div style="font-size:12px;color:var(--muted);padding:4px 0">No past sessions yet.</div>';return;}
  con.innerHTML='';
  dates.slice(0,15).forEach(date=>{
    const reps=h[date],nums=reps.map(r=>r.num).sort((a,b)=>a-b);
    const el=document.createElement('div');el.className='hist-item';
    const badge=reps.length===T?'<span class="hist-badge">complete</span>':'';
    el.innerHTML=`<div class="hist-top"><span class="hist-date">${date}</span><span>${badge}<span style="color:var(--muted);font-size:11px;margin-left:4px">${reps.length}/${T}</span></span></div>
    <div class="hist-chips">${nums.map(n=>{const r=reps.find(x=>x.num===n);return`<span class="chip${r&&r.note?' noted':''}" title="${r&&r.note||''}">${n}${r&&r.note?'*':''}</span>`;}).join('')}</div>`;
    con.appendChild(el);
  });
}

function exportCSV(){
  const h=getHist(),today=getToday(),all={...h};
  const reps=getReps();if(reps.length)all[today]=reps;
  let csv='date,champona,time,note\n';
  Object.keys(all).sort().forEach(d=>{all[d].forEach(r=>{csv+=`${d},${r.num},"${r.time}","${(r.note||'').replace(/"/g,'""')}"\n`;});});
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='champona_history.csv';a.click();
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){
    e.preventDefault();addNext();
  }
});

checkNewDay();render();
</script>
