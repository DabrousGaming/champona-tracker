<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Champona Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}
button {
  padding: 10px;
  margin: 8px;
}
table {
  margin: 20px auto;
  border-collapse: collapse;
}
td, th {
  border: 1px solid #444;
  padding: 10px;
}
</style>
</head>

<body>

<h1>Champona Tracker ☁️</h1>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>

<br>

<button id="addBtn">+ Champona</button>

<table>
<tr><th>Champona</th><th>Time</th></tr>
<tbody id="tableBody"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCmpmxQnDDOATHJGAGQmMMcb1Nv-fLuX08",
  authDomain: "champona-tracker.firebaseapp.com",
  projectId: "champona-tracker",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

let user = null;

// LOGIN
document.getElementById("loginBtn").onclick = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (err) {
    alert(err.message);
  }
};

// LOGOUT
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth);
};

// ADD REP
document.getElementById("addBtn").onclick = async () => {
  if (!user) return alert("Login first!");

  await addDoc(collection(db, "users", user.uid, "reps"), {
    time: new Date().toLocaleTimeString(),
    created: new Date()
  });

  loadData();
};

// LOAD DATA
async function loadData() {
  if (!user) return;

  const q = query(
    collection(db, "users", user.uid, "reps"),
    orderBy("created")
  );

  const snapshot = await getDocs(q);

  let table = document.getElementById("tableBody");
  table.innerHTML = "";

  let i = 1;
  snapshot.forEach(doc => {
    let d = doc.data();

    table.innerHTML += `
      <tr>
        <td>champona${i}</td>
        <td>${d.time}</td>
      </tr>
    `;
    i++;
  });
}

// AUTH STATE
onAuthStateChanged(auth, (u) => {
  if (u) {
    user = u;
    loadData();
  } else {
    user = null;
    document.getElementById("tableBody").innerHTML = "";
  }
});

</script>

</body>
</html>
